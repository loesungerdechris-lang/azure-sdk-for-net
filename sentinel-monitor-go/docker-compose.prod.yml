version: "3.8"

services:
  sentinel-monitor:
    image: ghcr.io/loesungerdechris-lang/sentinel-monitor-go@sha256:<FIXED_IMAGE_DIGEST>
    container_name: sentinel-monitor
    restart: unless-stopped
    read_only: true
    user: "10001:10001"
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 128m
    environment:
      - HEALTH_PATH=/tmp/sentinel-health.json
    tmpfs:
      - /tmp:size=16m,mode=1777
    env_file:
      - .env
    networks:
      - sentinel-net
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    healthcheck:
      test: ["CMD", "/app/sentinel-monitor"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

networks:
  sentinel-net:
    driver: bridge
