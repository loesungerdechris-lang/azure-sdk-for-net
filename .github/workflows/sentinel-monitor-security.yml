name: SENTINEL Monitor Security

on:
  push:
    branches: ["main", "release/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel-monitor-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.10"
          cache-dependency-path: sentinel-monitor-go/go.mod
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.10"
          cache-dependency-path: sentinel-monitor-go/go.mod
      - uses: github/codeql-action/init@v3
        with:
          languages: go
          build-mode: manual
      - name: Build monitor
        working-directory: sentinel-monitor-go
        run: go build ./cmd/sentinel-monitor
      - uses: github/codeql-action/analyze@v3
