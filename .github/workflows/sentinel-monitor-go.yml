name: SENTINEL Monitor Go CI

on:
  push:
    branches: ["main", "release/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test-build-container:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel-monitor-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.10"
          cache-dependency-path: sentinel-monitor-go/go.mod
      - run: test -z "$(gofmt -l cmd internal)"
      - run: go test ./...
      - run: go build ./cmd/sentinel-monitor
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t sentinel-monitor-go:ci .
