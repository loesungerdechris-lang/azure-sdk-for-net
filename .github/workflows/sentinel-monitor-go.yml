name: SENTINEL Monitor Go CI

on:
  push:
    branches: ["main", "release/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  test-build-container:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel-monitor-go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: sentinel-monitor-go/go.sum

      - name: Format check
        run: |
          test -z "$(gofmt -l cmd internal)"

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/sentinel-monitor

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container locally
        run: docker build -t sentinel-monitor-go:ci .
