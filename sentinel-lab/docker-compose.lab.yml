version: "3.8"

services:
  sentinel-monitor:
    build:
      context: ../sentinel-monitor-go
    container_name: sentinel-lab-monitor
    environment:
      - HEALTH_PATH=/tmp/sentinel/health.json
      - SELF_TEST_INTERVAL=60s
      - RPC_URL=http://anvil:8545
      - DISPATCHER_ADDRESS=dev-dispatcher-placeholder
    read_only: true
    user: "10001:10001"
    cap_drop:
      - ALL
    tmpfs:
      - /tmp/sentinel:size=16m,uid=10001,gid=10001,mode=1700
    depends_on:
      - anvil
      - ipfs
    networks:
      - sentinel-lab
    healthcheck:
      test: ["CMD", "/app/sentinel-monitor", "healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  anvil:
    image: ghcr.io/foundry-rs/foundry:stable
    container_name: sentinel-lab-anvil
    command: ["anvil", "--host", "0.0.0.0", "--port", "8545", "--block-time", "2"]
    ports:
      - "127.0.0.1:8545:8545"
    networks:
      - sentinel-lab

  ipfs:
    image: ipfs/kubo:v0.28.0
    container_name: sentinel-lab-ipfs
    ports:
      - "127.0.0.1:5001:5001"
      - "127.0.0.1:8080:8080"
    volumes:
      - ipfs-data:/data/ipfs
    networks:
      - sentinel-lab

networks:
  sentinel-lab:
    driver: bridge

volumes:
  ipfs-data:
